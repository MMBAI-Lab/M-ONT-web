    <text x="8"  y="35">★</text><text x="23" y="35">★</text><text x="38" y="35">★</text><text x="53" y="35">★</text><text x="68" y="35">★</text>
    <text x="15" y="46">★</text><text x="30" y="46">★</text><text x="45" y="46">★</text><text x="60" y="46">★</text>
